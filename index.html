<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ensayos</title>
  <meta name="description" content="Repositorio de ensayos como fuentes de consulta.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap">
  <link rel="stylesheet" href="css/estilo.css">
  <!-- Aplica el brillo guardado antes de pintar, para evitar el parpadeo. -->
  <script>
    try {
      var n = parseInt(localStorage.getItem('brillo'), 10) || 0;
      var P = [['#ffffff','#111111'],['#e8e8e8','#1a1a1a'],['#3a3a3a','#e0e0e0'],['#1e1e1e','#d8d8d8']];
      var p = P[n] || P[0], s = document.documentElement.style;
      s.setProperty('--bg', p[0]); s.setProperty('--fg', p[1]);
    } catch (e) {}
  </script>
</head>
<body>
  <div class="shell">
    <div class="top-menu">
      <div class="top-menu-row">
        <button class="opciones-toggle" id="opciones-toggle">opciones ›</button>
        <nav class="nav-links" aria-label="Ordenar el índice">
          <button type="button" class="conmutador-boton" data-vista="fecha">por fecha</button>
          <button type="button" class="conmutador-boton" data-vista="tema">por tema</button>
        </nav>
      </div>
      <div class="opciones-panel" id="opciones-panel">
        <div class="setting-group">
          <span class="setting-label">brillo</span>
          <div class="brillo-dots">
            <div class="brillo-dot" data-nivel="0" style="background:#ffffff"></div>
            <div class="brillo-dot" data-nivel="1" style="background:#e8e8e8"></div>
            <div class="brillo-dot" data-nivel="2" style="background:#3a3a3a"></div>
            <div class="brillo-dot" data-nivel="3" style="background:#1e1e1e"></div>
          </div>
        </div>
      </div>
    </div>

    <header class="site-header">
      <a class="site-title" href="index.html">ensayos</a>
    </header>

    <main id="indice" class="indice main" aria-live="polite"></main>
  </div>

  <script type="module">
    import { limpiarManifest, agruparPorAnio, agruparPorTema, fechaNumerica }
      from './js/logica.js';
    import { initOpciones } from './js/ui.js';

    initOpciones();

    const cont = document.getElementById('indice');
    const botones = [...document.querySelectorAll('.conmutador-boton')];
    let ensayos = [];

    const VISTAS = ['fecha', 'tema'];
    const vistaActual = () => {
      const h = location.hash.replace('#', '');
      return VISTAS.includes(h) ? h : 'fecha';
    };

    function entrada(e) {
      const art = document.createElement('article');
      art.className = 'entrada';

      const a = document.createElement('a');
      a.className = 'entrada-link';
      a.href = `ensayo.html?id=${encodeURIComponent(e.slug)}`;

      if (e.fecha) {
        const f = document.createElement('span');
        f.className = 'entrada-fecha';
        f.textContent = fechaNumerica(e.fecha);
        a.appendChild(f);
      }
      const t = document.createElement('span');
      t.className = 'entrada-titulo';
      t.textContent = e.titulo;
      if (e.palabras) {
        const w = document.createElement('span');
        w.className = 'entrada-palabras';
        w.textContent = `(${e.palabras})`;
        t.appendChild(document.createTextNode(' '));
        t.appendChild(w);
      }
      a.appendChild(t);
      art.appendChild(a);

      if (e.abstract) {
        const p = document.createElement('p');
        p.className = 'entrada-abstract';
        p.textContent = e.abstract;
        art.appendChild(p);
      }
      return art;
    }

    function estado(texto) {
      const d = document.createElement('p');
      d.className = 'estado';
      d.textContent = texto;
      return d;
    }

    function render() {
      const vista = vistaActual();
      botones.forEach(b =>
        b.setAttribute('aria-current', String(b.dataset.vista === vista)));
      cont.innerHTML = '';

      if (!ensayos.length) {
        cont.appendChild(estado('Todavía no hay ensayos publicados.'));
        return;
      }

      const grupos = vista === 'tema'
        ? agruparPorTema(ensayos)
        : agruparPorAnio(ensayos);

      for (const g of grupos) {
        const sec = document.createElement('section');
        sec.className = 'grupo';
        const h = document.createElement('h2');
        h.className = 'grupo-titulo';
        h.textContent = vista === 'tema' ? g.tema : g.anio;
        sec.appendChild(h);
        for (const e of g.items) sec.appendChild(entrada(e));
        cont.appendChild(sec);
      }
    }

    async function cargar() {
      try {
        const r = await fetch('manifest.json', { cache: 'no-cache' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        ensayos = limpiarManifest(await r.json());
        render();
      } catch (err) {
        console.error(err);
        cont.innerHTML = '';
        cont.appendChild(estado(
          'No se pudo cargar el índice. Si abriste el archivo con doble clic, ' +
          'sírvelo desde un servidor local (ver LEEME.md).'));
      }
    }

    botones.forEach(b =>
      b.addEventListener('click', () => { location.hash = b.dataset.vista; }));
    window.addEventListener('hashchange', render);
    cargar();
  </script>
</body>
</html>
