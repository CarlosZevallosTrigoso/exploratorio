<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ensayo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap">
  <link rel="stylesheet" href="css/estilo.css">
  <script>
    try {
      var n = parseInt(localStorage.getItem('brillo'), 10) || 0;
      var P = [['#ffffff','#111111'],['#e8e8e8','#1a1a1a'],['#3a3a3a','#e0e0e0'],['#1e1e1e','#d8d8d8']];
      var p = P[n] || P[0], s = document.documentElement.style;
      s.setProperty('--bg', p[0]); s.setProperty('--fg', p[1]);
    } catch (e) {}
  </script>
  <!-- Markdown -> HTML. Versión fijada. UMD expone el global `marked`. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"></script>
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>
  <div class="shell">
    <div class="top-menu">
      <div class="top-menu-row">
        <button class="opciones-toggle" id="opciones-toggle">opciones ›</button>
        <nav class="nav-links">
          <a class="nav-link" href="index.html">← índice</a>
          <div class="navegador">
            <button type="button" class="nav-link navegador-boton" aria-expanded="false"
                    aria-controls="caja-navegacion">ensayos ›</button>
            <div id="caja-navegacion" class="caja-navegacion" hidden></div>
          </div>
          <div class="navegador" id="grupo-descargas" hidden>
            <button type="button" class="nav-link navegador-boton" id="descargar-boton"
                    aria-expanded="false" aria-controls="caja-descargas">descargar ›</button>
            <div id="caja-descargas" class="caja-navegacion" hidden>
              <ul>
                <li><a id="descargar-md">· markdown (.md)</a></li>
                <li><button type="button" id="descargar-pdf" class="caja-accion">· pdf (imprimir)</button></li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
      <div class="opciones-panel" id="opciones-panel">
        <div class="setting-group">
          <span class="setting-label">brillo</span>
          <div class="brillo-dots">
            <div class="brillo-dot" data-nivel="0" style="background:#ffffff"></div>
            <div class="brillo-dot" data-nivel="1" style="background:#e8e8e8"></div>
            <div class="brillo-dot" data-nivel="2" style="background:#3a3a3a"></div>
            <div class="brillo-dot" data-nivel="3" style="background:#1e1e1e"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="disposicion main">
      <article id="ensayo" class="ensayo"></article>
      <aside class="toc" aria-label="Contenido del ensayo">
        <p class="toc-titulo">contenido</p>
        <nav id="toc-lista"></nav>
      </aside>
    </div>
  </div>

  <script type="module">
    import { slugsUnicos, limpiarManifest, fechaNumerica, contarPalabras, tiempoLectura }
      from './js/logica.js';
    import { initOpciones } from './js/ui.js';

    initOpciones();

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const art = document.getElementById('ensayo');
    const aside = document.querySelector('.toc');
    const tocLista = document.getElementById('toc-lista');

    function mostrarError(texto) {
      art.innerHTML = '';
      const d = document.createElement('div');
      d.className = 'estado';
      d.textContent = texto;
      art.appendChild(d);
      aside.hidden = true;
    }

    function construirNavegador(manifest) {
      const boton = document.querySelector('.navegador-boton');
      const caja = document.getElementById('caja-navegacion');
      if (!manifest.length) { boton.disabled = true; return; }

      const ul = document.createElement('ul');
      for (const e of manifest) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `ensayo.html?id=${encodeURIComponent(e.slug)}`;
        a.target = '_blank';            // se abre en otra ventana
        a.rel = 'noopener';
        a.textContent = e.titulo;
        if (e.slug === id) a.setAttribute('aria-current', 'true');
        li.appendChild(a);
        ul.appendChild(li);
      }
      caja.appendChild(ul);

      const cerrar = () => {
        boton.setAttribute('aria-expanded', 'false');
        boton.textContent = 'ensayos ›';
        caja.hidden = true;
      };
      boton.addEventListener('click', () => {
        const abierto = boton.getAttribute('aria-expanded') === 'true';
        boton.setAttribute('aria-expanded', String(!abierto));
        boton.textContent = abierto ? 'ensayos ›' : 'ensayos ×';
        caja.hidden = abierto;
      });
      document.addEventListener('click', (ev) => {
        if (!caja.hidden && !caja.contains(ev.target) && ev.target !== boton) cerrar();
      });
      document.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape' && !caja.hidden) { cerrar(); boton.focus(); }
      });
    }

    function construirToc(cuerpo) {
      const enc = [...cuerpo.querySelectorAll('h2, h3')];
      if (!enc.length) { aside.hidden = true; return; }
      const ids = slugsUnicos(enc.map(h => h.textContent));
      tocLista.innerHTML = '';
      enc.forEach((h, i) => {
        h.id = ids[i];
        const a = document.createElement('a');
        a.href = `#${ids[i]}`;
        a.textContent = h.textContent;
        a.className = h.tagName === 'H3' ? 'toc-enlace toc-sub' : 'toc-enlace';
        a.dataset.destino = ids[i];
        tocLista.appendChild(a);
      });
      activarScrollSpy(enc);
    }

    function activarScrollSpy(encabezados) {
      const enlaces = new Map(
        [...tocLista.querySelectorAll('a')].map(a => [a.dataset.destino, a]));
      const visibles = new Set();
      const obs = new IntersectionObserver((entradas) => {
        for (const e of entradas) {
          if (e.isIntersecting) visibles.add(e.target.id);
          else visibles.delete(e.target.id);
        }
        let activo = null;
        for (const h of encabezados) { if (visibles.has(h.id)) { activo = h.id; break; } }
        enlaces.forEach((a, k) => a.setAttribute('aria-current', String(k === activo)));
      }, { rootMargin: '0px 0px -70% 0px', threshold: 0 });
      encabezados.forEach(h => obs.observe(h));
    }

    function initDescargas(slug) {
      const grupo = document.getElementById('grupo-descargas');
      const boton = document.getElementById('descargar-boton');
      const caja = document.getElementById('caja-descargas');
      const aMd = document.getElementById('descargar-md');
      const bPdf = document.getElementById('descargar-pdf');

      // El .md fuente ya existe en disco; lo servimos tal cual, byte a byte.
      aMd.href = `ensayos/${encodeURIComponent(slug)}.md`;
      aMd.download = `${slug}.md`;

      const cerrar = () => {
        boton.setAttribute('aria-expanded', 'false');
        boton.textContent = 'descargar ›';
        caja.hidden = true;
      };
      boton.addEventListener('click', () => {
        const abierto = boton.getAttribute('aria-expanded') === 'true';
        boton.setAttribute('aria-expanded', String(!abierto));
        boton.textContent = abierto ? 'descargar ›' : 'descargar ×';
        caja.hidden = abierto;
      });
      document.addEventListener('click', (ev) => {
        if (!caja.hidden && !caja.contains(ev.target) && ev.target !== boton) cerrar();
      });
      document.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape' && !caja.hidden) { cerrar(); boton.focus(); }
      });
      // PDF = imprimir; el navegador usa document.title como nombre sugerido.
      bPdf.addEventListener('click', () => { cerrar(); window.print(); });

      grupo.hidden = false;   // solo se revela cuando el ensayo cargó bien
    }

    function initProgreso() {
      const barra = document.getElementById('progress-bar');
      const actualizar = () => {
        const alto = document.documentElement.scrollHeight - window.innerHeight;
        barra.style.width = (alto > 0 ? (window.scrollY / alto) * 100 : 0) + '%';
      };
      window.addEventListener('scroll', actualizar, { passive: true });
      actualizar();
    }

    function render(meta, md) {
      art.innerHTML = '';

      const cab = document.createElement('header');
      cab.className = 'ensayo-cabecera';
      const h1 = document.createElement('h1');
      h1.textContent = meta ? meta.titulo : id;
      cab.appendChild(h1);
      if (meta && meta.subtitulo) {
        const sub = document.createElement('p');
        sub.className = 'ensayo-subtitulo';
        sub.textContent = meta.subtitulo;
        cab.appendChild(sub);
      }
      const palabras = contarPalabras(md);
      const m = document.createElement('p');
      m.className = 'ensayo-meta';
      const trozos = [];
      if (meta && meta.fecha) trozos.push(fechaNumerica(meta.fecha));
      trozos.push(`${palabras} palabras`);
      trozos.push(`~${tiempoLectura(palabras)} min`);
      m.textContent = trozos.join(' · ');
      cab.appendChild(m);
      art.appendChild(cab);

      // Cuerpo: Markdown -> HTML. (marked no sanitiza; el contenido es propio.)
      const cuerpo = document.createElement('div');
      cuerpo.className = 'ensayo-cuerpo';
      cuerpo.innerHTML = marked.parse(md);
      art.appendChild(cuerpo);

      document.title = (meta ? meta.titulo : id) + ' — ensayos';
      construirToc(cuerpo);
      initProgreso();
      initDescargas(id);
    }

    async function init() {
      if (!id) { mostrarError('No se indicó qué ensayo abrir.'); return; }
      if (typeof marked === 'undefined') {
        mostrarError('No se pudo cargar el procesador de Markdown (revisa tu conexión).');
        return;
      }

      let manifest = [];
      try {
        const rm = await fetch('manifest.json', { cache: 'no-cache' });
        if (rm.ok) manifest = limpiarManifest(await rm.json());
      } catch { /* el manifest es opcional para mostrar el cuerpo */ }

      const meta = manifest.find(e => e.slug === id) || null;
      construirNavegador(manifest);

      let md;
      try {
        const r = await fetch(`ensayos/${encodeURIComponent(id)}.md`, { cache: 'no-cache' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        md = await r.text();
      } catch (err) {
        console.error(err);
        mostrarError('No se encontró este ensayo. Revisa el enlace o vuelve al índice.');
        return;
      }

      render(meta, md);
    }

    init();
  </script>
</body>
</html>
